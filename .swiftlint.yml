# Cujana SwiftLint rules
# Keep this file small. Architecture-specific checks also live in scripts/check_architecture.sh.

included:
  - Cujana
  - CujanaTests
  - CujanaUITests

excluded:
  - .build
  - DerivedData
  - Carthage
  - Pods
  - CujanaUITests

allow_zero_lintable_files: true
strict: true

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

analyzer_rules:
  - unused_declaration

line_length:
  warning: 120
  error: 140
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 450
  error: 650

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 450

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - ok
    - xs
    - sm
    - md
    - lg
    - xl

custom_rules:
  no_swiftui_in_domain:
    name: "No SwiftUI in Domain"
    included:
      - "Cujana/Domain/.*\\.swift"
    regex: "import\\s+(SwiftUI|UIKit|SwiftData|CoreData)"
    message: "Domain must stay independent from UI and persistence frameworks. Move this code or add an ADR-backed adapter."
    severity: error

  no_urlsession_in_features:
    name: "No direct URLSession in Features"
    included:
      - "Cujana/Features/.*\\.swift"
    regex: "URLSession(\\.shared)?"
    message: "Features must call use cases or repository protocols, not URLSession directly."
    severity: error

  no_persistence_in_features:
    name: "No direct persistence in Features"
    included:
      - "Cujana/Features/.*\\.swift"
    regex: "(UserDefaults\\.standard|ModelContext|@Query|NSManagedObjectContext|FileManager\\.default)"
    message: "Features must not access persistence directly. Use a repository protocol."
    severity: error

  no_manager_suffix:
    name: "No Manager suffix"
    included:
      - "Cujana/.*\\.swift"
    regex: "\\b(class|struct|actor)\\s+[A-Z][A-Za-z0-9]*Manager\\b"
    message: "Avoid vague Manager types. Use a precise name such as Repository, UseCase, Router, Store, Client, or Adapter."
    severity: error

  no_static_shared:
    name: "No static shared service"
    included:
      - "Cujana/.*\\.swift"
    regex: "static\\s+let\\s+shared\\b"
    message: "Avoid global singletons for app services. Inject dependencies from App/Composition."
    severity: error

  no_force_try_or_cast:
    name: "No force try or force cast"
    included:
      - "Cujana/.*\\.swift"
    regex: "(try!|as!)"
    message: "Avoid try! and as!. Handle errors and casting explicitly."
    severity: error

  no_direct_color:
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "Color\\.(red|blue|green|black|white|gray)|Color\\("
    message: "Use ColorToken"
    severity: error

  no_magic_padding:
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "\\.padding\\((?!\\.)([0-9]+)"
    message: "Use SpacingToken"
    severity: error

  no_magic_radius:
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "cornerRadius\\(([0-9]+)"
    message: "Use RadiusToken"
    severity: error

  no_magic_frame_size:
    name: "No magic frame size"
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "\\.frame\\([^\\n]*(width|height|minWidth|minHeight|maxWidth|maxHeight):\\s*[0-9]"
    message: "Move fixed frame sizes into semantic design or component tokens."
    severity: error

  no_magic_grid_minimum:
    name: "No magic grid minimum"
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "minimum:\\s*[0-9]"
    message: "Move adaptive grid minimums into semantic design or component tokens."
    severity: error

  no_direct_font_size:
    name: "No direct font size"
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "\\.system\\([^\\n]*size:"
    message: "Use semantic typography or component font tokens instead of direct font sizes."
    severity: error

  no_magic_opacity:
    name: "No magic opacity"
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "\\.opacity\\(\\s*([0-9]|[^\\n]*\\?\\s*[0-9])"
    message: "Move opacity values into semantic design or component tokens."
    severity: error

  no_magic_scale_effect:
    name: "No magic scale effect"
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "\\.scaleEffect\\([^\\n]*[0-9]+\\.[0-9]+"
    message: "Move scale effect values into semantic design or component tokens."
    severity: error

  no_magic_animation_duration:
    name: "No magic animation duration"
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "duration:\\s*[0-9]"
    message: "Move animation durations into semantic design or component tokens."
    severity: error

  no_direct_shadow:
    included:
      - "Cujana/.*\\.swift"
    excluded:
      - "Cujana/DesignSystem/.*"
    regex: "\\.shadow\\("
    message: "Use ShadowToken"
    severity: error
