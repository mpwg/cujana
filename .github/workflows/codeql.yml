name: CodeQL

on:
  push:
    branches:
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"
    paths:
      - "Cujana/**"
      - "CujanaTests/**"
      - "CujanaUITests/**"
      - "Cujana.xcodeproj/**"
      - "Configuration/**"
      - ".github/workflows/codeql.yml"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
  CUJANA_SENTRY_DSN: ${{ secrets.CUJANA_SENTRY_DSN }}
  CUJANA_TELEMETRY_APP_ID: ${{ secrets.CUJANA_TELEMETRY_APP_ID }}
  POLLENINFORMATION_API_KEY: ${{ secrets.POLLENINFORMATION_API_KEY }}
  SWIFTPM_CACHE_PATH: ${{ github.workspace }}/.swiftpm-cache

jobs:
  analyze:
    name: CodeQL (Swift)
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: LocalSecrets.xcconfig erzeugen
        run: ./scripts/write_ci_local_secrets.sh

      - name: Xcode 26.4 auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Xcode-Version ausgeben
        run: |
          xcodebuild -version
          xcode-select -p

      - name: SwiftPM-Cache wiederherstellen
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.SWIFTPM_CACHE_PATH }}
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: swiftpm-macos-26-xcode-26_4-codeql-${{ hashFiles('Cujana.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            swiftpm-macos-26-xcode-26_4-codeql-
            swiftpm-macos-26-xcode-26_4-

      - name: CodeQL initialisieren
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Swift Packages auflösen
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Cujana.xcodeproj \
            -scheme Cujana \
            -clonedSourcePackagesDirPath "${SWIFTPM_CACHE_PATH}" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates

      - name: App für CodeQL bauen
        run: |
          xcodebuild build \
            -project Cujana.xcodeproj \
            -scheme Cujana \
            -clonedSourcePackagesDirPath "${SWIFTPM_CACHE_PATH}" \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData-CodeQL" \
            CODE_SIGNING_ALLOWED=NO

      - name: CodeQL auswerten
        uses: github/codeql-action/analyze@v4
