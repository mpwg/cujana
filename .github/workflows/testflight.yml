name: TestFlight

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog für diesen TestFlight-Build"
        required: true
        type: string

concurrency:
  group: testflight-release
  cancel-in-progress: false

jobs:
  testflight:
    name: TestFlight hochladen
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      CUJANA_SENTRY_DSN: ${{ secrets.CUJANA_SENTRY_DSN }}
      CUJANA_TELEMETRY_APP_ID: ${{ secrets.CUJANA_TELEMETRY_APP_ID }}
      POLLENINFORMATION_API_KEY: ${{ secrets.POLLENINFORMATION_API_KEY }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BRANCH: ${{ secrets.MATCH_GIT_BRANCH }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      CI: "1"

    steps:
      - name: Release-Kontext ausgeben
        run: |
          echo "Workflow: TestFlight"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Actor: ${GITHUB_ACTOR}"

      - name: TestFlight-Branch validieren
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" && "${GITHUB_REF_NAME}" != release/* ]]; then
            echo "FEHLER: Dieser Workflow darf nur auf main oder release/* Branches laufen."
            echo "Aktueller Branch: ${GITHUB_REF_NAME}"
            exit 1
          fi
        shell: bash

      - name: Changelog validieren
        run: |
          if [[ -z "${{ inputs.changelog }}" ]]; then
            echo "FEHLER: changelog ist erforderlich."
            exit 1
          fi
        shell: bash

      - name: Checkout
        uses: actions/checkout@v6

      - name: Xcode 26.4 auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Release-Secrets validieren
        run: |
          missing=()
          required=(
            APPLE_DEVELOPER_TEAM_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_PRIVATE_KEY
            CUJANA_SENTRY_DSN
            CUJANA_TELEMETRY_APP_ID
            POLLENINFORMATION_API_KEY
            MATCH_GIT_URL
            MATCH_PASSWORD
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'FEHLER: Fehlende GitHub-Secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
        shell: bash

      - name: Xcode-Version ausgeben
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Ruby und Bundler einrichten
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: TestFlight-Build hochladen
        run: |
          echo "Starte expliziten TestFlight-Upload von ${GITHUB_REF_NAME}."
          bundle exec fastlane ios beta changelog:"${{ inputs.changelog }}"
        shell: bash
