name: Architecture Guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    name: Architecture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run architecture checks
        run: ./scripts/check_architecture.sh

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run SwiftLint
        run: |
          docker run --rm \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            ghcr.io/realm/swiftlint:0.63.2 \
            lint --strict

  xcode-tests:
    name: Xcode tests
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer
      DERIVED_DATA_PATH: .xcode-derived-data
      DESTINATION: platform=macOS,arch=arm64,variant=Mac Catalyst,name=My Mac
      MACOSX_DEPLOYMENT_TARGET: "26.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        id: xcode-version
        run: |
          set -euo pipefail
          xcodebuild -version
          cache_version="$(xcodebuild -version | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          echo "xcode-cache-version=$cache_version" >> "$GITHUB_OUTPUT"

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .xcode-derived-data/SourcePackages
          key: swiftpm-${{ runner.os }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-${{ hashFiles('Cujana.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-

      - name: Cache Xcode build products
        uses: actions/cache@v4
        with:
          path: |
            .xcode-derived-data/Build
            .xcode-derived-data/ModuleCache.noindex
            .xcode-derived-data/SDKStatCaches.noindex
          key: xcodebuild-maccatalyst-${{ runner.os }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-${{ hashFiles('Cujana.xcodeproj/project.pbxproj', 'Cujana.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'Cujana.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Cujana/**/*.swift', 'CujanaTests/**/*.swift') }}
          restore-keys: |
            xcodebuild-maccatalyst-${{ runner.os }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-

      - name: Run Xcode tests
        run: |
          set -euo pipefail

          xcodebuild -resolvePackageDependencies \
            -project Cujana.xcodeproj \
            -scheme Cujana-UnitTests \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates

          xcodebuild test -quiet -showBuildTimingSummary \
            -project Cujana.xcodeproj \
            -scheme Cujana-UnitTests \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -parallelizeTargets \
            -jobs "$(sysctl -n hw.ncpu)" \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 4 \
            -collect-test-diagnostics never \
            COMPILER_INDEX_STORE_ENABLE=NO \
            MACOSX_DEPLOYMENT_TARGET="$MACOSX_DEPLOYMENT_TARGET" \
            CODE_SIGNING_ALLOWED=NO
