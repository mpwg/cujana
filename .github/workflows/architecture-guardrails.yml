name: Architecture Guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    name: Architecture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run architecture checks
        run: ./scripts/check_architecture.sh

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run SwiftLint
        run: |
          docker run --rm \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            ghcr.io/realm/swiftlint:0.63.2 \
            lint --strict

  xcode-tests:
    name: Xcode tests
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer
      DERIVED_DATA_PATH: .xcode-derived-data
      XCODE_VERSION: 26.4.1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .xcode-derived-data/SourcePackages
          key: swiftpm-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Cujana.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-

      - name: Cache Xcode build products
        uses: actions/cache@v4
        with:
          path: |
            .xcode-derived-data/Build
            .xcode-derived-data/ModuleCache.noindex
            .xcode-derived-data/SDKStatCaches.noindex
          key: xcodebuild-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Cujana.xcodeproj/project.pbxproj', 'Cujana.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'Cujana.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Cujana/**/*.swift', 'CujanaTests/**/*.swift') }}
          restore-keys: |
            xcodebuild-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project Cujana.xcodeproj \
            -scheme Cujana-UnitTests \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates

      - name: Build for testing while simulator boots
        run: |
          set -euo pipefail

          wait_for_simulator_boot() {
            local status_file="$1"
            local timeout_seconds="$2"
            local elapsed=0

            while [ ! -f "$status_file" ]; do
              [ "$elapsed" -lt "$timeout_seconds" ] || return 124
              sleep 1
              elapsed=$((elapsed + 1))
            done

            [ "$(cat "$status_file")" = "0" ]
          }

          simulator_boot_status="$RUNNER_TEMP/simulator-boot-status"
          rm -f "$simulator_boot_status"

          (
            set +e
            xcrun simctl boot "iPhone 17"
            boot_result=$?
            if [ "$boot_result" -ne 0 ] && [ "$boot_result" -ne 149 ]; then
              echo "::warning::Simulator boot returned $boot_result; xcodebuild destination resolution may still recover."
            fi
            xcrun simctl bootstatus "iPhone 17" -b
            echo "$?" > "$simulator_boot_status"
          ) &
          simulator_boot_pid=$!

          cleanup() {
            if kill -0 "$simulator_boot_pid" >/dev/null 2>&1; then
              kill "$simulator_boot_pid" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          xcodebuild build-for-testing -quiet -showBuildTimingSummary \
            -project Cujana.xcodeproj \
            -scheme Cujana-UnitTests \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -destination-timeout 30 \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -parallelizeTargets \
            -jobs "$(sysctl -n hw.ncpu)" \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 4 \
            -collect-test-diagnostics never \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO

          if ! wait_for_simulator_boot "$simulator_boot_status" 60; then
            echo "::warning::Simulator boot did not finish within 60 seconds after build; continuing with xcodebuild destination resolution."
            kill "$simulator_boot_pid" >/dev/null 2>&1 || true
          fi
          wait "$simulator_boot_pid" >/dev/null 2>&1 || true
          trap - EXIT

      - name: Run tests without building
        run: |
          set -euo pipefail
          xcodebuild test-without-building -quiet \
            -project Cujana.xcodeproj \
            -scheme Cujana-UnitTests \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -destination-timeout 30 \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 4 \
            -collect-test-diagnostics never \
            CODE_SIGNING_ALLOWED=NO
