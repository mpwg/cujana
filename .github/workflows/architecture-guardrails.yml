name: Architecture Guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    name: Architecture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run architecture checks
        run: ./scripts/check_architecture.sh

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run SwiftLint
        run: |
          docker run --rm \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            ghcr.io/realm/swiftlint:0.63.2 \
            lint --strict

  xcode-tests:
    name: Xcode tests
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer
      DERIVED_DATA_PATH: .xcode-derived-data
      PACKAGE_CACHE_PATH: .swiftpm-package-cache
      SPM_CLONES_PATH: .xcode-source-packages
      XCODE_VERSION: 26.4.1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            .swiftpm-package-cache
            .xcode-source-packages
          key: swiftpm-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Cujana.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-

      - name: Cache Xcode build products
        uses: actions/cache@v4
        with:
          path: |
            .xcode-derived-data/Build
            .xcode-derived-data/ModuleCache.noindex
            .xcode-derived-data/SDKStatCaches.noindex
          key: xcodebuild-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Cujana.xcodeproj/project.pbxproj', 'Cujana.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'Cujana.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Cujana/**/*.swift', 'CujanaTests/**/*.swift') }}
          restore-keys: |
            xcodebuild-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project Cujana.xcodeproj \
            -clonedSourcePackagesDirPath "$SPM_CLONES_PATH" \
            -packageCachePath "$PACKAGE_CACHE_PATH" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates

      - name: Run Xcode tests
        run: |
          set -euo pipefail
          xcodebuild test -quiet -showBuildTimingSummary \
            -project Cujana.xcodeproj \
            -scheme Cujana-UnitTests \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -destination-timeout 30 \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SPM_CLONES_PATH" \
            -packageCachePath "$PACKAGE_CACHE_PATH" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -parallelizeTargets \
            -jobs "$(sysctl -n hw.ncpu)" \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 4 \
            -collect-test-diagnostics never \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO
